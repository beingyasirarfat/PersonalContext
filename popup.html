<!DOCTYPE html>
<html>

<head>
	<title>Yasir Arfat's Awesome Extension</title>
	<link rel="stylesheet" href="assets/CSS/popup.css">
</head>

<body>
	<div id="form">
		<input type="text" id="Word" autofocus placeholder="Put the word to be saved here..." />
		<input type="hidden" id="Definition" />
		<input type="hidden" id="Translation" />
		<button id="Save" class="btn btn-primary" style="height: 30px;">
			Save Word
		</button>
	</div>
	<div id="usage-tip" style="display: block;"></div>
	<div id="status-box" style="display: none;color: green;">
		<div id="status-msg"></div>
	</div>
	<button class="btn btn-primary" id="ViewWords" style="display:inline"> Review Saved </a></button>
	<button class="btn btn-primary" id="Invert" style="display:inline"> Invert Page Color </a></button>
	<button class="btn btn-primary" id="AllNotes" style="display:inline"> Notes </a></button>
	<button class="btn btn-primary" id="AddNote" style="display:inline"> Add Note </a></button>
	<div class="container">
		<div class="row">
			<table class="table table-bordered table-striped table-hover">
				<thead id="TableHead" style="font-size: 20px;font-weight:400">
				</thead>
				<tbody id="TableBody">
				</tbody>
		</div>
	</div>
</body>
<script type="text/javascript" src="assets/JS/popup.js"></script>
<script src="assets/JS/taskspopup.js"></script>
</html>
